<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bricc'd - Lego Studio</title>
    <script type="module" crossorigin src="/assets/index-CpJFPOYf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BhjHmwct.css">
  <link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
  <body>
    <div id="auth-overlay">
      <div class="auth-card">
        <h1>Bricc'd</h1>
        <p>Login to start building</p>
        <div class="auth-methods">
          <input type="email" placeholder="Email" id="email" />
          <input type="password" placeholder="Password" id="password" />
          <div class="btn-group">
            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign Up</button>
          </div>
          <hr/>
          <button id="google-login-btn" class="secondary">Login with Google</button>
        </div>
      </div>
    </div>

    <div id="profile-ui" class="hidden">
      <div class="profile-card">
        <button id="close-profile">×</button>
        <h2>Your Character</h2>
        <div id="avatar-preview"></div>
        <div class="avatar-controls">
          <div class="control-group">
            <label>Face Type</label>
            <select id="face-type">
              <option value="classic">Classic Smile</option>
              <option value="cool">Sunglasses</option>
              <option value="surprised">Surprised</option>
              <option value="wink">Wink</option>
            </select>
          </div>
          <div class="control-group">
            <label>Head <input type="color" id="head-color" value="#ffff00"></label>
            <label>Torso <input type="color" id="torso-color" value="#ff0000"></label>
            <label>Legs <input type="color" id="legs-color" value="#0000ff"></label>
          </div>
        </div>
        <button id="save-avatar">Save & Close</button>
        <button id="logout-btn" class="danger">Logout</button>
      </div>
    </div>

    <div id="toolbox" class="hidden">
      <button id="open-profile">👤 Profile</button>
      <hr/>
      <h3>File</h3>
      <button id="save-local">💾 Save Local</button>
      <button id="load-local">📂 Load Local</button>
      <hr/>
      <h3>Pieces</h3>
      <div id="piece-list"></div>
      <hr/>
      <h3>Tools</h3>
      <button id="align-view">Align View</button>
      <button id="erase-mode">Eraser</button>
      <button id="rotate-piece">Rotate</button>
      <button id="lift-piece">Lift</button>
      <button id="drop-piece">Drop</button>
    </div>

    <div id="vr-controls"></div>

    <canvas id="app"></canvas>
  </body>
</html>
